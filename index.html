<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>😊</title>
    <style>
        body { 
            margin: 0; background: #000; color: #ff0000; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; text-align: center;
        }
        #alert-content { width: 95%; }
        h1 { font-size: 5em; margin: 0; line-height: 1; }
        .danger { font-size: 3em; color: #fff; margin: 20px 0; }
        #timer { font-size: 8em; color: #ffff00; font-weight: bold; margin: 20px 0; }
        
        /* 騙されたね表示用 */
        #trick-msg { 
            display: none; font-size: 10em; color: #fff; text-shadow: 0 0 20px #fff; 
        }

        .body-flash { animation: strobe 0.5s infinite; }
        .full-flash { animation: rainbow-flash 0.08s infinite; }
        
        @keyframes strobe {
            0% { background: #550000; } 50% { background: #000; } 100% { background: #550000; }
        }
        @keyframes rainbow-flash {
            0% { background: #f00; } 20% { background: #ff0; } 40% { background: #0f0; }
            60% { background: #0ff; } 80% { background: #00f; } 100% { background: #f0f; }
        }
    </style>
</head>
<body class="body-flash">

    <div id="alert-content">
        <h1>あなたのデバイスにウイルスが侵入しました。</h1>
        <div class="danger">ウイルスによって全てのデータや、個人情報が第三者に悪用されています。</div>
        <div id="timer">01:00</div>
        <div style="font-size: 2em; color: #fff;">今すぐ修復を完了しなければ、すべての個人データが永久に消失します。</div>
        <button onclick="triggerFullPanic()" style="padding: 20px 50px; font-size: 2em; background: #f00; color: #fff; border: none; cursor: pointer; margin-top: 30px;">緊急修復を実行</button>
    </div>

    <div id="trick-msg">騙されたね</div>

    <script>
        let time = 60;
        const timerEl = document.getElementById('timer');
        const content = document.getElementById('alert-content');
        const trickMsg = document.getElementById('trick-msg');

        const interval = setInterval(() => {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            timerEl.innerText = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
            if (time <= 0) {
                clearInterval(interval);
                triggerFullPanic();
            }
        }, 1000);

        function triggerFullPanic() {
            content.style.display = 'none';
            trickMsg.style.display = 'block';
            document.body.className = 'full-flash';
        }
    </script>
</body>
</html>
