<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL ALERT</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        
        /* 警告モーダル */
        #warning-box { border: 3px solid #ff0000; padding: 40px; background: #330000; width: 80%; max-width: 500px; box-shadow: 0 0 20px #ff0000; }
        h1 { color: #ff0000; text-transform: uppercase; margin: 0; }
        #timer { font-size: 4em; color: #ffeb3b; margin: 20px 0; }
        
        /* 点滅アニメーション */
        @keyframes strobe {
            0% { background: #ff0000; } 20% { background: #00ff00; } 40% { background: #0000ff; }
            60% { background: #ffff00; } 80% { background: #ff00ff; } 100% { background: #00ffff; }
        }
        .strobe-effect { animation: strobe 0.08s infinite; }
    </style>
</head>
<body>

    <div id="warning-box">
        <h1>重大なシステムエラー</h1>
        <p>ウイルスがルートディレクトリを攻撃しています。<br>全データが消去されるまで：</p>
        <div id="timer">01:00</div>
        <p>※修復プロセスを中断するとSIMカードが永続的にロックされます。</p>
        <button onclick="triggerFlash()">警告を消去する</button>
    </div>

    <script>
        let time = 60;
        const timerEl = document.getElementById('timer');
        const box = document.getElementById('warning-box');

        // カウントダウン
        const interval = setInterval(() => {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            timerEl.innerText = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
            if (time <= 0) {
                clearInterval(interval);
                triggerFlash();
            }
        }, 1000);

        function triggerFlash() {
            box.style.display = 'none';
            document.body.classList.add('strobe-effect');
        }
    </script>
</body>
</html>
