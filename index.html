<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SYSTEM CRITICAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #modal { border: 2px solid #f00; padding: 40px; background: #200; text-align: center; width: 80%; }
        #timer { font-size: 5em; color: #ff0; }
        /* 虹色点滅用のアニメーション */
        @keyframes rainbow-flash {
            0% { background: #ff0000; }
            20% { background: #ffff00; }
            40% { background: #00ff00; }
            60% { background: #00ffff; }
            80% { background: #0000ff; }
            100% { background: #ff00ff; }
        }
        .flash { animation: rainbow-flash 0.1s infinite; }
    </style>
</head>
<body>

    <div id="modal">
        <h1>システム異常を検出</h1>
        <div id="timer">00:05</div>
        <p>カウントダウン終了後、システムが強制再起動します。</p>
    </div>

    <script>
        let time = 5;
        const timerEl = document.getElementById('timer');
        const modal = document.getElementById('modal');

        const interval = setInterval(() => {
            time--;
            timerEl.innerText = "00:0" + time;
            if (time <= 0) {
                clearInterval(interval);
                modal.style.display = 'none';
                // 虹色点滅開始
                document.body.classList.add('flash');
            }
        }, 1000);
    </script>
</body>
</html>
